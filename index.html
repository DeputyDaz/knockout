<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>World Cup Knockout Sweep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">FIFA World Cup 2026</p>
        <h1>Knockout Sweep Bracket</h1>
      </div>
      <div class="header-card">
        <span>Round of 32</span>
        <strong>June 28 - July 19</strong>
      </div>
    </header>

    <main class="bracket-shell" aria-label="World Cup knockout bracket">
      <section class="bracket-grid" id="bracket"></section>
    </main>

    <footer class="site-footer">
      <span>Dates and times are listed in UK time.</span>
      <span>Update teams, names, flags, scores, and winners in <strong>script.js</strong>.</span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
